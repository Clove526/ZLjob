[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# API代理转发 - 部署Railway后端后替换为实际地址
# 例如: https://zljob-backend.up.railway.app
[[redirects]]
  from = "/api/*"
  to = "https://zljob-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA路由：所有未匹配路径返回index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200