[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# API 代理转发 - Railway 后端地址
[[redirects]]
  from = "/api/*"
  to = "https://zljob-production-89e5.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA 路由：所有未匹配路径返回 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
